<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PepetGPT</title>

    <style>
      :root {
        --bg: #212121;
        --sidebar-bg: #171717;
        --input-bg: #2f2f2f;
        --border: #3f3f3f;
        --text: #ececec;
        --text-muted: #8e8ea0;
        --user-bubble: #2f2f2f;
        --accent: #19c37d;
        --btn-hover: #3a3a3a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      /* ================= SIDEBAR ================= */

      .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 1000;
      }

      .sidebar-header {
        padding: 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .sidebar-title {
        font-size: 18px;
        font-weight: bold;
      }

      .sidebar-content {
        padding: 10px;
        flex: 1;
        overflow-y: auto;
      }

      .chat-item {
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 8px;
        background: transparent;
        color: var(--text-muted);
        transition: 0.2s;
        user-select: none;
      }

      .chat-item:hover {
        background: var(--btn-hover);
        color: var(--text);
      }

      .chat-item.active {
        background: var(--btn-hover);
        color: var(--text);
      }

      /* ================= OVERLAY ================= */

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 999;
      }

      .overlay.show {
        display: block;
      }

      /* ================= MAIN ================= */

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .topbar {
        height: 60px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        flex-shrink: 0;
      }

      .topbar-title {
        font-size: 18px;
        font-weight: bold;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        transition: 0.2s;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        background: var(--btn-hover);
      }

      /* ================= CHAT ================= */

      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px 14px;
      }

      .messages-wrapper {
        width: 100%;
        max-width: 800px;
        margin: auto;
      }

      .message-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .msg-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: bold;
        flex-shrink: 0;
      }

      .msg-content {
        max-width: 85%;
      }

      .user-bubble {
        background: var(--user-bubble);
        padding: 12px 15px;
        border-radius: 18px;
        line-height: 1.6;
        word-break: break-word;
      }

      .bot-text {
        line-height: 1.7;
        word-break: break-word;
      }

      .bot-text pre {
        background: #111;
        padding: 12px;
        border-radius: 10px;
        overflow-x: auto;
        margin-top: 10px;
      }

      .bot-text code {
        color: #f7d774;
      }

      /* ================= INPUT ================= */

      .input-area {
        border-top: 1px solid var(--border);
        padding: 14px;
        flex-shrink: 0;
      }

      .input-wrapper {
        max-width: 800px;
        margin: auto;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      textarea {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        resize: none;
        color: white;
        font-size: 15px;
        max-height: 180px;
        min-height: 24px;
      }

      .send-btn {
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: white;
        color: black;
        font-size: 18px;
        flex-shrink: 0;
      }

      /* ================= LOADING ================= */

      .loading {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }

      .loading span {
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }

      .loading span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loading span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ================= MOBILE ================= */

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          transform: translateX(-100%);
        }

        .sidebar.show {
          transform: translateX(0);
        }

        .msg-content {
          max-width: 92%;
        }

        .chat-area {
          padding: 14px 10px;
        }

        .input-area {
          padding: 10px;
        }

        .topbar {
          padding: 0 10px;
        }
      }
    </style>
  </head>

  <body>
    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">PepetGPT</div>

        <button class="icon-btn" onclick="closeSidebar()">✕</button>
      </div>

      <div class="sidebar-content">
        <div class="chat-item active" onclick="newChat()">+ Chat Baru</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- TOPBAR -->
      <div class="topbar">
        <button class="icon-btn" onclick="openSidebar()">☰</button>

        <div class="topbar-title">PepetGPT</div>
      </div>

      <!-- CHAT -->
      <div class="chat-area" id="chatArea">
        <div class="messages-wrapper" id="messagesWrapper"></div>
      </div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            rows="1"
            placeholder="Tanyakan sesuatu..."
          ></textarea>

          <button class="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>

    <!-- MARKED -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");

      const userInput = document.getElementById("userInput");
      const messagesWrapper = document.getElementById("messagesWrapper");
      const chatArea = document.getElementById("chatArea");

      // ================= SIDEBAR =================

      function openSidebar() {
        sidebar.classList.add("show");
        overlay.classList.add("show");
      }

      function closeSidebar() {
        sidebar.classList.remove("show");
        overlay.classList.remove("show");
      }

      // ================= NEW CHAT =================

      function newChat() {
        messagesWrapper.innerHTML = "";

        closeSidebar();
      }

      // ================= AUTO RESIZE =================

      userInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
      });

      // ================= ENTER SEND =================

      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();

          sendMessage();
        }
      });

      // ================= SEND =================

      async function sendMessage() {
        const message = userInput.value.trim();

        if (!message) return;

        appendUserMessage(message);

        userInput.value = "";
        userInput.style.height = "auto";

        const loading = appendLoading();

        try {
          const res = await fetch("/chat", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              message: message,
            }),
          });

          loading.remove();

          if (!res.ok) {
            appendBotMessage("⚠️ Server error.");

            return;
          }

          const data = await res.json();

          appendBotMessage(data.reply || "Tidak ada respon.");
        } catch (err) {
          loading.remove();

          appendBotMessage("⚠️ Gagal konek ke server.");

          console.error(err);
        }
      }

      // ================= USER MESSAGE =================

      function appendUserMessage(text) {
        const row = document.createElement("div");

        row.className = "message-row user";

        row.innerHTML = `
        <div class="msg-content">
          <div class="user-bubble">
            ${escapeHtml(text)}
          </div>
        </div>
      `;

        messagesWrapper.appendChild(row);

        scrollBottom();
      }

      // ================= BOT LOADING =================

      function appendLoading() {
        const row = document.createElement("div");

        row.className = "message-row";

        row.innerHTML = `
        <div class="msg-avatar">
          P
        </div>

        <div class="msg-content">

          <div class="loading">
            <span></span>
            <span></span>
            <span></span>
          </div>

        </div>
      `;

        messagesWrapper.appendChild(row);

        scrollBottom();

        return row;
      }

      // ================= BOT MESSAGE =================

      function appendBotMessage(text) {
        const row = document.createElement("div");

        row.className = "message-row";

        row.innerHTML = `
        <div class="msg-avatar">
          P
        </div>

        <div class="msg-content">

          <div class="bot-text">
            ${marked.parse(text)}
          </div>

        </div>
      `;

        messagesWrapper.appendChild(row);

        scrollBottom();
      }

      // ================= ESCAPE =================

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ================= SCROLL =================

      function scrollBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    </script>
  </body>
</html>
