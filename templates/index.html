<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>PepetGPT</title>

    <style>
      :root {
        --bg: #212121;
        --sidebar-bg: #171717;
        --input-bg: #2f2f2f;
        --border: #3f3f3f;
        --text: #ececec;
        --text-muted: #8e8ea0;
        --user-bubble: #2f2f2f;
        --accent: #19c37d;
        --btn-hover: #3a3a3a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        display: flex;
      }

      /* ================= SIDEBAR ================= */

      .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        transition: transform 0.25s ease;
        z-index: 1000;
      }

      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-title {
        font-size: 15px;
        font-weight: 700;
      }

      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .new-chat-btn {
        width: 100%;
        border: none;
        background: var(--input-bg);
        color: var(--text);
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        margin-bottom: 12px;
      }

      .new-chat-btn:hover {
        background: var(--btn-hover);
      }

      .chat-item {
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 4px;
      }

      .chat-item:hover {
        background: var(--btn-hover);
        color: var(--text);
      }

      .sidebar-footer {
        border-top: 1px solid var(--border);
        padding: 14px;
      }

      .user-box {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(135deg, #19c37d, #0f766e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: bold;
      }

      /* ================= MAIN ================= */

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .topbar {
        height: 60px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        flex-shrink: 0;
      }

      .menu-btn {
        position: absolute;
        left: 14px;
        border: none;
        background: none;
        color: var(--text);
        cursor: pointer;
        display: none;
      }

      .menu-btn svg {
        width: 24px;
        height: 24px;
      }

      .topbar-title {
        font-size: 15px;
        font-weight: 600;
      }

      /* ================= CHAT ================= */

      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .messages {
        max-width: 800px;
        margin: auto;
      }

      .message {
        display: flex;
        margin-bottom: 20px;
      }

      .message.user {
        justify-content: flex-end;
      }

      .bubble {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 16px;
        line-height: 1.6;
        word-break: break-word;
      }

      .user .bubble {
        background: var(--user-bubble);
      }

      .bot .bubble {
        background: transparent;
      }

      .welcome {
        max-width: 700px;
        margin: auto;
        text-align: center;
        padding-top: 80px;
      }

      .welcome h1 {
        font-size: 28px;
        margin-bottom: 12px;
      }

      .welcome p {
        color: var(--text-muted);
      }

      /* ================= INPUT ================= */

      .input-area {
        padding: 16px;
        border-top: 1px solid var(--border);
      }

      .input-box {
        max-width: 800px;
        margin: auto;
        display: flex;
        gap: 10px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px;
      }

      textarea {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        resize: none;
        color: var(--text);
        font-size: 15px;
        max-height: 140px;
      }

      button.send-btn {
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: white;
        color: black;
        flex-shrink: 0;
      }

      /* ================= MOBILE ================= */

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        display: none;
      }

      .overlay.active {
        display: block;
      }

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          bottom: 0;
          transform: translateX(-100%);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .menu-btn {
          display: block;
        }

        .chat-area {
          padding: 14px;
        }

        .bubble {
          max-width: 95%;
          font-size: 14px;
        }

        .welcome {
          padding-top: 50px;
        }

        .welcome h1 {
          font-size: 22px;
        }

        .input-area {
          padding: 10px;
        }

        .input-box {
          border-radius: 14px;
        }

        textarea {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body>
    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">PepetGPT</div>

        <button
          onclick="closeSidebar()"
          style="
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 22px;
          "
        >
          ×
        </button>
      </div>

      <div class="sidebar-content">
        <button class="new-chat-btn" onclick="newChat()">+ Chat Baru</button>

        <div id="chatHistory"></div>
      </div>

      <div class="sidebar-footer">
        <div class="user-box">
          <div class="avatar">P</div>
          <div>PepetGPT User</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <button class="menu-btn" onclick="openSidebar()">
          <svg
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M3 6h18M3 12h18M3 18h18"></path>
          </svg>
        </button>

        <div class="topbar-title">PepetGPT</div>
      </div>

      <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
          <h1>Apa yang ingin kamu tanyakan?</h1>
          <p>PepetGPT siap membantu kamu.</p>
        </div>

        <div class="messages" id="messages"></div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea
            id="input"
            rows="1"
            placeholder="Tanyakan sesuatu..."
          ></textarea>

          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const welcome = document.getElementById("welcome");
      const historyBox = document.getElementById("chatHistory");

      let chatCount = 1;

      function openSidebar() {
        sidebar.classList.add("open");
        overlay.classList.add("active");
      }

      function closeSidebar() {
        sidebar.classList.remove("open");
        overlay.classList.remove("active");
      }

      function newChat() {
        messages.innerHTML = "";
        welcome.style.display = "block";

        const item = document.createElement("div");
        item.className = "chat-item";
        item.textContent = "Chat Baru " + chatCount++;
        historyBox.prepend(item);

        closeSidebar();
      }

      function appendMessage(text, type) {
        const msg = document.createElement("div");
        msg.className = "message " + type;

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        if (type === "bot") {
          bubble.innerHTML = marked.parse(text);
        } else {
          bubble.textContent = text;
        }

        msg.appendChild(bubble);
        messages.appendChild(msg);

        scrollBottom();
      }

      function scrollBottom() {
        const area = document.getElementById("chatArea");
        area.scrollTop = area.scrollHeight;
      }

      async function sendMessage() {
        const text = input.value.trim();

        if (!text) return;

        welcome.style.display = "none";

        appendMessage(text, "user");

        input.value = "";
        input.style.height = "auto";

        appendMessage("Mengetik...", "bot");

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message: text,
            }),
          });

          const data = await res.json();

          messages.lastChild.remove();

          appendMessage(data.reply || "⚠️ Tidak ada respon dari AI.", "bot");
        } catch (err) {
          messages.lastChild.remove();

          appendMessage("⚠️ Gagal terhubung ke server.", "bot");
        }

        closeSidebar();
      }

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      input.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
      });

      // Tutup sidebar otomatis kalau resize ke desktop
      window.addEventListener("resize", () => {
        if (window.innerWidth > 768) {
          closeSidebar();
        }
      });
    </script>
  </body>
</html>
