<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PepetGPT</title>

    <style>
      :root {
        --bg: #212121;
        --sidebar-bg: #171717;
        --input-bg: #2f2f2f;
        --border: #3f3f3f;
        --text: #ececec;
        --text-muted: #8e8ea0;
        --user-bubble: #2f2f2f;
        --accent: #19c37d;
        --btn-hover: #3f3f3f;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* ================= SIDEBAR ================= */

      .sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
        overflow: hidden;
        flex-shrink: 0;
      }

      .sidebar.closed {
        width: 0;
        border-right: none;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-title {
        font-size: 18px;
        font-weight: bold;
        white-space: nowrap;
      }

      .icon-btn {
        background: transparent;
        border: none;
        color: var(--text);
        cursor: pointer;
        padding: 8px;
        border-radius: 8px;
        transition: 0.2s;
      }

      .icon-btn:hover {
        background: var(--btn-hover);
      }

      .chat-list {
        padding: 10px;
        overflow-y: auto;
        flex: 1;
      }

      .chat-item {
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 6px;
        color: var(--text-muted);
        transition: 0.2s;
      }

      .chat-item:hover {
        background: var(--btn-hover);
        color: var(--text);
      }

      /* ================= MAIN ================= */

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .topbar {
        height: 60px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 10px;
        flex-shrink: 0;
      }

      .topbar-title {
        font-size: 18px;
        font-weight: bold;
      }

      .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .messages-wrapper {
        max-width: 800px;
        margin: auto;
      }

      .message-row {
        display: flex;
        margin-bottom: 18px;
        gap: 10px;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .msg-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: bold;
        flex-shrink: 0;
      }

      .msg-content {
        max-width: 80%;
      }

      .user-bubble {
        background: var(--user-bubble);
        padding: 12px 15px;
        border-radius: 18px;
        line-height: 1.6;
        word-break: break-word;
      }

      .bot-text {
        line-height: 1.7;
        word-break: break-word;
      }

      .bot-text pre {
        background: #111;
        padding: 12px;
        border-radius: 10px;
        overflow-x: auto;
        margin-top: 10px;
      }

      .bot-text code {
        color: #f5d67b;
      }

      /* ================= INPUT ================= */

      .input-area {
        padding: 14px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }

      .input-wrapper {
        max-width: 800px;
        margin: auto;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        display: flex;
        align-items: flex-end;
        padding: 10px;
        gap: 10px;
      }

      textarea {
        flex: 1;
        background: transparent;
        border: none;
        resize: none;
        outline: none;
        color: white;
        font-size: 15px;
        max-height: 180px;
        min-height: 24px;
      }

      .send-btn {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: white;
        color: black;
        font-weight: bold;
      }

      .send-btn:hover {
        opacity: 0.9;
      }

      /* ================= LOADING ================= */

      .loading {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }

      .loading span {
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }

      .loading span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loading span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ================= MOBILE ================= */

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          z-index: 999;
          height: 100%;
        }

        .sidebar.closed {
          transform: translateX(-100%);
          width: 260px;
        }

        .msg-content {
          max-width: 90%;
        }
      }
    </style>
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">PepetGPT</div>

        <button class="icon-btn" onclick="toggleSidebar()">✕</button>
      </div>

      <div class="chat-list">
        <div class="chat-item">Chat Baru</div>
        <div class="chat-item">Belajar Python</div>
        <div class="chat-item">Rumus Matematika</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- TOPBAR -->
      <div class="topbar">
        <!-- OPEN BUTTON -->
        <button class="icon-btn" onclick="toggleSidebar()">☰</button>

        <div class="topbar-title">PepetGPT</div>
      </div>

      <!-- CHAT -->
      <div class="chat-area" id="chatArea">
        <div class="messages-wrapper" id="messagesWrapper"></div>
      </div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Tanyakan sesuatu..."
            rows="1"
          ></textarea>

          <button class="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>

    <!-- MARKED -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
      const sidebar = document.getElementById("sidebar");
      const userInput = document.getElementById("userInput");
      const messagesWrapper = document.getElementById("messagesWrapper");
      const chatArea = document.getElementById("chatArea");

      let isSidebarOpen = true;

      // ================= SIDEBAR =================

      function toggleSidebar() {
        isSidebarOpen = !isSidebarOpen;

        if (isSidebarOpen) {
          sidebar.classList.remove("closed");
        } else {
          sidebar.classList.add("closed");
        }
      }

      // ================= AUTO RESIZE =================

      userInput.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
      });

      // ================= ENTER SEND =================

      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // ================= SEND =================

      async function sendMessage() {
        const message = userInput.value.trim();

        if (!message) return;

        appendUserMessage(message);

        userInput.value = "";
        userInput.style.height = "auto";

        const loading = appendLoading();

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message: message,
            }),
          });

          loading.remove();

          if (!res.ok) {
            appendBotMessage("⚠️ Server error.");
            return;
          }

          const data = await res.json();

          appendBotMessage(data.reply || "Tidak ada respon.");
        } catch (err) {
          loading.remove();

          appendBotMessage("⚠️ Gagal konek ke server.");

          console.error(err);
        }
      }

      // ================= USER MESSAGE =================

      function appendUserMessage(text) {
        const row = document.createElement("div");

        row.className = "message-row user";

        row.innerHTML = `
        <div class="msg-content">
          <div class="user-bubble">${escapeHtml(text)}</div>
        </div>
      `;

        messagesWrapper.appendChild(row);

        scrollBottom();
      }

      // ================= BOT LOADING =================

      function appendLoading() {
        const row = document.createElement("div");

        row.className = "message-row";

        row.innerHTML = `
        <div class="msg-avatar">P</div>

        <div class="msg-content">
          <div class="loading">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      `;

        messagesWrapper.appendChild(row);

        scrollBottom();

        return row;
      }

      // ================= BOT MESSAGE =================

      function appendBotMessage(text) {
        const row = document.createElement("div");

        row.className = "message-row";

        const safeHtml = marked.parse(text);

        row.innerHTML = `
        <div class="msg-avatar">P</div>

        <div class="msg-content">
          <div class="bot-text">${safeHtml}</div>
        </div>
      `;

        messagesWrapper.appendChild(row);

        scrollBottom();
      }

      // ================= ESCAPE =================

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ================= SCROLL =================

      function scrollBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    </script>
  </body>
</html>
