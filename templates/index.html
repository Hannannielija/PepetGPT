<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PepetGPT</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .chat-container {
        width: 420px;
        background: #16213e;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        height: 580px;
      }
      .chat-header {
        background: #0f3460;
        padding: 16px 20px;
        text-align: center;
        color: white;
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .chat-header span {
        color: #e94560;
      }
      .chat-box {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .message {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.5;
        word-wrap: break-word;
      }
      .message.user {
        background: #e94560;
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }
      .message.bot {
        background: #0f3460;
        color: #ddd;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      .message.loading {
        background: #0f3460;
        color: #888;
        align-self: flex-start;
        font-style: italic;
      }
      .chat-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        background: #0f3460;
      }
      .chat-input input {
        flex: 1;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        background: #1a1a2e;
        color: white;
        font-size: 14px;
        outline: none;
      }
      .chat-input input::placeholder {
        color: #666;
      }
      .chat-input button {
        padding: 10px 18px;
        background: #e94560;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: background 0.2s;
      }
      .chat-input button:hover {
        background: #c73652;
      }
      .chat-input button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .message.bot h1,
      .message.bot h2,
      .message.bot h3 {
        margin: 8px 0 4px;
      }
      .message.bot p {
        margin: 4px 0;
      }
      .message.bot ul,
      .message.bot ol {
        margin: 4px 0 4px 20px;
      }
      .message.bot code {
        background: #1a1a2e;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
      }
      .message.bot pre {
        background: #1a1a2e;
        padding: 10px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 6px 0;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-header">Pepet<span>GPT</span> 🤖</div>
      <div class="chat-box" id="chatBox">
        <div class="message bot">
          Halo! Saya PepetGPT. Ada yang bisa saya bantu? 😊
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ketik pesan..." />
        <button id="sendBtn" onclick="sendMessage()">Kirim</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [["$", "$"]],
          displayMath: [["$$", "$$"]],
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      const chatBox = document.getElementById("chatBox");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendMessage();
      });

      async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage(message, "user");
        userInput.value = "";
        sendBtn.disabled = true;

        const loadingEl = appendMessage(
          "PepetGPT sedang mengetik...",
          "loading",
        );

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message }),
          });
          const data = await res.json();
          loadingEl.remove();
          appendMessage(data.reply, "bot");
        } catch (error) {
          loadingEl.remove();
          appendMessage("Terjadi kesalahan. Coba lagi!", "bot");
        }

        sendBtn.disabled = false;
        userInput.focus();
      }

      function appendMessage(text, type) {
        const div = document.createElement("div");
        div.classList.add("message", type);
        if (type === "bot") {
          div.innerHTML = marked.parse(text);
          // Render ulang simbol matematika setelah markdown diparse
          MathJax.typesetPromise([div]);
        } else {
          div.textContent = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
      }
    </script>
  </body>
</html>
